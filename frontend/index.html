<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>明細管理</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>💴</text></svg>">
  <link rel="stylesheet" href="__ROOT_PATH__/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="header-title">明細管理</h1>
      <div class="header-controls">
        <select id="year-select" class="year-select"></select>
        <button id="new-year-btn" class="btn btn-ghost">+ 新しい年</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-title" id="month-list-header" style="cursor:pointer;user-select:none;">
          月一覧 <span id="month-list-chevron">▼</span>
        </div>
        <ul id="month-list" class="month-list"></ul>
        <div class="sidebar-annual" id="annual-summary"></div>
      </aside>

      <main class="main">
        <div class="month-header" id="month-header"></div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="entries">明細</button>
          <button class="tab-btn" data-tab="recurring">固定費</button>
          <button class="tab-btn" data-tab="charts">グラフ</button>
          <button class="tab-btn" data-tab="settings">設定</button>
        </div>

        <div id="tab-entries" class="tab-content active">
          <div class="tab-toolbar">
            <button id="add-entry-btn" class="btn btn-primary">+ 追加</button>
          </div>
          <ul id="entry-list" class="entry-list"></ul>
        </div>

        <div id="tab-recurring" class="tab-content">
          <div class="tab-toolbar">
            <button id="add-recurring-btn" class="btn btn-primary">+ 追加</button>
          </div>
          <ul id="recurring-list" class="entry-list"></ul>
        </div>

        <div id="tab-charts" class="tab-content">
          <div class="charts-grid">
            <div class="chart-card">
              <h3>月別収支</h3>
              <canvas id="chart-monthly"></canvas>
              <h3 style="margin-top:1.2rem;">年間累積収支</h3>
              <div style="position: relative; height: 260px;">
                <canvas id="chart-cumulative"></canvas>
              </div>
            </div>
            <div class="chart-card">
              <h3>今月の内訳</h3>
              <canvas id="chart-breakdown"></canvas>
            </div>
            <div class="chart-card chart-full">
              <h3>タグ別収支（今月）</h3>
              <canvas id="chart-tags"></canvas>
              <p id="no-tags-msg" class="chart-empty">タグが設定された明細がありません</p>
            </div>
            <div class="chart-card chart-full">
              <h3>タグ別収支（今年）</h3>
              <div id="tag-filter-section" class="tag-filter-section"></div>
              <canvas id="chart-tag-monthly"></canvas>
              <p id="no-filter-msg" class="chart-empty">タグを選択してください</p>
            </div>
          </div>
        </div>
        <div id="tab-settings" class="tab-content">
          <div class="settings-section">
            <h3 class="settings-title">タグ階層設定</h3>
            <p class="settings-desc">サブクラスのタグを追加すると親タグが自動的に付与されます。グルーピングはサブクラス側が優先されます。</p>
            <div id="hierarchy-settings"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>window.ROOT_PATH = "__ROOT_PATH__";</script>
  <script src="__ROOT_PATH__/static/api.js"></script>
  <script src="__ROOT_PATH__/static/state.js"></script>
  <script src="__ROOT_PATH__/static/data.js"></script>
  <script src="__ROOT_PATH__/static/sidebar.js"></script>
  <script src="__ROOT_PATH__/static/entries.js"></script>
  <script src="__ROOT_PATH__/static/recurring.js"></script>
  <script src="__ROOT_PATH__/static/charts.js"></script>
  <script src="__ROOT_PATH__/static/tag-hierarchy.js"></script>
  <script src="__ROOT_PATH__/static/app.js"></script>
</body>
</html>
