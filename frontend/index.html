<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>明細管理</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="header-title">明細管理</h1>
      <div class="header-controls">
        <select id="year-select" class="year-select"></select>
        <button id="new-year-btn" class="btn btn-ghost">+ 新しい年</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-title">月一覧</div>
        <ul id="month-list" class="month-list"></ul>
        <div class="sidebar-annual" id="annual-summary"></div>
      </aside>

      <main class="main">
        <div class="month-header" id="month-header"></div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="entries">明細</button>
          <button class="tab-btn" data-tab="recurring">固定費</button>
          <button class="tab-btn" data-tab="charts">グラフ</button>
        </div>

        <div id="tab-entries" class="tab-content active">
          <div class="tab-toolbar">
            <button id="add-entry-btn" class="btn btn-primary">+ 追加</button>
          </div>
          <ul id="entry-list" class="entry-list"></ul>
        </div>

        <div id="tab-recurring" class="tab-content">
          <div class="tab-toolbar">
            <button id="add-recurring-btn" class="btn btn-primary">+ 追加</button>
          </div>
          <ul id="recurring-list" class="entry-list"></ul>
        </div>

        <div id="tab-charts" class="tab-content">
          <div class="charts-grid">
            <div class="chart-card">
              <h3>月別収支</h3>
              <canvas id="chart-monthly"></canvas>
            </div>
            <div class="chart-card">
              <h3>今月の内訳</h3>
              <canvas id="chart-breakdown"></canvas>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/static/api.js"></script>
  <script src="/static/state.js"></script>
  <script src="/static/data.js"></script>
  <script src="/static/sidebar.js"></script>
  <script src="/static/entries.js"></script>
  <script src="/static/recurring.js"></script>
  <script src="/static/charts.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
